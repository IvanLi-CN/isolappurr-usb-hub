name: Host tools

on:
  pull_request:
    paths:
      - "tools/isolapurr-host/**"
      - "tools/firmware-catalog/**"
      - ".github/workflows/host-tools.yml"
      - "Justfile"
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: host-tools-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: host tools (${{ matrix.slug }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: linux-x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: isolapurr-host-tools-linux-x86_64.tar.gz
          - slug: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            archive: isolapurr-host-tools-macos-aarch64.tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/workflows/host-tools.yml
            Justfile
            tools/firmware-catalog
            tools/isolapurr-host
          sparse-checkout-cone-mode: false

      - name: Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/isolapurr-host/target
          key: ${{ runner.os }}-${{ matrix.target }}-isolapurr-host-${{ hashFiles('tools/isolapurr-host/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-isolapurr-host-

      - name: Test host tools
        run: cargo +stable test --manifest-path tools/isolapurr-host/Cargo.toml --target "${{ matrix.target }}"

      - name: Build host tools
        run: cargo +stable build --manifest-path tools/isolapurr-host/Cargo.toml --release --bins --target "${{ matrix.target }}"

      - name: Smoke devd help
        shell: bash
        run: |
          set -euo pipefail
          ext=""
          if [ "${{ runner.os }}" = "Windows" ]; then ext=".exe"; fi
          "tools/isolapurr-host/target/${{ matrix.target }}/release/isolapurr-devd${ext}" --help >/dev/null
          "tools/isolapurr-host/target/${{ matrix.target }}/release/isolapurr${ext}" --help >/dev/null

      - name: Package host tools
        shell: bash
        run: |
          set -euo pipefail
          ext=""
          if [ "${{ runner.os }}" = "Windows" ]; then ext=".exe"; fi
          out="dist/host-tools"
          mkdir -p "$out"
          cp "tools/isolapurr-host/target/${{ matrix.target }}/release/isolapurr${ext}" "$out/"
          cp "tools/isolapurr-host/target/${{ matrix.target }}/release/isolapurr-devd${ext}" "$out/"
          printf '%s\n' \
            "IsolaPurr host tools" \
            "" \
            "- isolapurr: user CLI" \
            "- isolapurr-devd: local device daemon" \
            > "$out/README.txt"
          tar -czf "dist/${{ matrix.archive }}" -C "$out" .

      - name: Upload host tools
        uses: actions/upload-artifact@v4
        with:
          name: isolapurr-host-tools-${{ matrix.slug }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error
