name: Label Gate

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - ready_for_review
  merge_group:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: label-gate-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  validate:
    name: Label Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base policy
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false
          sparse-checkout: |
            .github/quality-gates.json
            .github/scripts/release_intent.py
          sparse-checkout-cone-mode: false

      - name: Load current pull request labels
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" --json labels --jq '.labels' > labels.json

      - name: Validate release intent labels
        if: github.event_name == 'pull_request'
        run: |
          python3 .github/scripts/release_intent.py validate \
            --labels-json-file labels.json \
            --policy .github/quality-gates.json

      - name: Accept merge queue handoff
        if: github.event_name == 'merge_group'
        run: |
          echo "merge_group inherits release-intent validation from the queued pull request."
