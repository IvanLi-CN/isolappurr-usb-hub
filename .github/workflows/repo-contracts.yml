name: Repo Contracts

on:
  pull_request:
    paths:
      - ".github/scripts/**"
      - ".github/workflows/repo-contracts.yml"
      - "AGENTS.md"
      - "README.md"
      - "docs/maintainer-workflow.md"
      - "docs/specs/r7m2q-cli-devd-alignment/**"
      - "skills/isolapurr-developer-operations/**"
      - "skills/isolapurr-maintainer-workflow/**"
      - "skills/isolapurr-user-operations/**"
      - "tools/isolapurr-host/install/**"
      - "tools/isolapurr-host/src/bin/isolapurr/**"
  push:
    branches:
      - main
    paths:
      - ".github/scripts/**"
      - ".github/workflows/repo-contracts.yml"
      - "AGENTS.md"
      - "README.md"
      - "docs/maintainer-workflow.md"
      - "docs/specs/r7m2q-cli-devd-alignment/**"
      - "skills/isolapurr-developer-operations/**"
      - "skills/isolapurr-maintainer-workflow/**"
      - "skills/isolapurr-user-operations/**"
      - "tools/isolapurr-host/install/**"
      - "tools/isolapurr-host/src/bin/isolapurr/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repo-contracts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python contract tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run contract tests
        run: python3 -m unittest discover -s .github/scripts -p "test_*.py"
