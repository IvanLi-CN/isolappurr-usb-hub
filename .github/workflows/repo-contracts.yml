name: Repo Contracts

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repo-contracts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Repo Contracts / Python contract tests
    runs-on: ubuntu-latest
    steps:
      - name: Truth-source coverage note
        run: |
          cat <<'EOF'
          Repo contract coverage includes:
          - AGENTS.md
          - README.md
          - web/README.md
          - docs/maintainer-workflow.md
          - .github/workflows/firmware.yml
          - .github/workflows/release.yml
          - docs/specs/kvbq9-web-demo-surface-policy/**
          - docs/specs/r7m2q-cli-devd-alignment/**
          - skills/isolapurr-user-operations/**
          - skills/isolapurr-developer-operations/**
          - skills/isolapurr-maintainer-workflow/**
          - tools/isolapurr-host/src/bin/isolapurr/**
          - web/src/App.tsx
          - web/src/pages/**
          EOF

      - name: Checkout
        uses: actions/checkout@v4

      - name: Run contract tests
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover -s .github/scripts -p "test_*.py"
