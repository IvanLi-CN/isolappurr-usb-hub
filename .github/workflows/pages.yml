name: Pages

on:
  pull_request:
  merge_group:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Deploy Pages from an existing stable release asset."
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  pr-build:
    name: PR build
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: "true"
      VITE_BUILD_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Decide whether to build
        id: gate
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          if git diff --name-only "origin/${{ github.base_ref }}"...HEAD -- \
            web .github/workflows/pages.yml .github/workflows/release.yml | grep -q .; then
            echo "run_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip build (no web changes)
        if: steps.gate.outputs.run_build != 'true'
        run: echo "No web-related changes in this PR; skipping Pages PR build."

      - name: Setup Bun
        if: steps.gate.outputs.run_build == 'true'
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.5

      - name: Cache Bun
        if: steps.gate.outputs.run_build == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install deps
        if: steps.gate.outputs.run_build == 'true'
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Set build date
        if: steps.gate.outputs.run_build == 'true'
        run: echo "VITE_BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Build
        if: steps.gate.outputs.run_build == 'true'
        working-directory: web
        env:
          VITE_BASE: /
        run: bun run build

  backfill:
    name: upload backfill artifact
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Download stable web asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p dist/release web/dist
          gh release download "$RELEASE_TAG" \
            --pattern "isolapurr-web-dist-*.tar.gz" \
            --dir dist/release
          tar -xzf dist/release/isolapurr-web-dist-*.tar.gz -C web/dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist

  deploy:
    name: deploy Pages
    if: github.event_name == 'workflow_dispatch'
    needs: backfill
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
