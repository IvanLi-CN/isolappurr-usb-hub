<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">IsolaPurr USB Hub maskable icon</title>
  <desc id="desc">A full-bleed maskable icon using the IsolaPurr mark geometry.</desc>
  <rect width="256" height="256" rx="58" fill="#f7f5ed" />
  <g>
    <defs>
        <linearGradient id="shell" x1="42" x2="214" y1="42" y2="214" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#cfe2db" />
          <stop offset="1" stop-color="#83b7a7" />
        </linearGradient>
        <linearGradient id="panel" x1="66" x2="190" y1="78" y2="174" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#fff8e8" />
          <stop offset="1" stop-color="#e8dcc0" />
        </linearGradient>
        <linearGradient id="rail" x1="80" x2="176" y1="102" y2="146" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#35413e" />
          <stop offset="1" stop-color="#1d2524" />
        </linearGradient>
      </defs>
      <rect x="42" y="42" width="172" height="172" rx="40" fill="url(#shell)" />
      <rect x="66" y="78" width="124" height="92" rx="30" fill="url(#panel)" />
      <rect x="80" y="104" width="96" height="36" rx="17" fill="url(#rail)" />
      <rect x="98" y="117" width="60" height="9" rx="4.5" fill="#f7f1df" />
      <rect x="96" y="154" width="64" height="5" rx="2.5" fill="#7dd9e9" opacity="0.84" />
  </g>
</svg>
